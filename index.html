<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF 페이지 편집기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: #1f2937;
    }
    header {
      padding: 36px 24px 24px;
      text-align: center;
    }
    header h1 {
      margin: 0 0 10px;
      font-size: 34px;
    }
    header p {
      margin: 0;
      color: #64748b;
      font-size: 16px;
    }
    main {
      width: min(1180px, 94vw);
      margin: 0 auto 60px;
    }
    .panel {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.10);
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .upload-box {
      flex: 1;
      min-width: 280px;
      border: 2px dashed #c7d2fe;
      border-radius: 18px;
      padding: 18px;
      background: #f8fafc;
    }
    input[type="file"] {
      width: 100%;
      font-size: 15px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .12s ease, opacity .12s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }
    .primary {
      background: #4f46e5;
      color: white;
    }
    .secondary {
      background: #eef2ff;
      color: #3730a3;
    }
    .danger {
      background: #fee2e2;
      color: #b91c1c;
    }
    .hint {
      margin: 0 0 18px;
      color: #64748b;
      line-height: 1.6;
      font-size: 14px;
    }
    .status {
      margin: 12px 0 0;
      color: #475569;
      font-size: 14px;
    }
    .pages {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 18px;
      min-height: 120px;
    }
    .page-card {
      position: relative;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 12px;
      cursor: grab;
      transition: transform .14s ease, box-shadow .14s ease, border .14s ease;
    }
    .page-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.10);
      border-color: #a5b4fc;
    }
    .page-card.dragging {
      opacity: .45;
      border: 2px dashed #4f46e5;
    }
    canvas.thumb {
      width: 100%;
      height: 205px;
      object-fit: contain;
      background: white;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
    }
    .page-meta {
      margin-top: 9px;
      font-size: 13px;
      color: #475569;
      line-height: 1.35;
    }
    .page-num {
      font-weight: 800;
      color: #111827;
    }
    .mini-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .mini-actions button {
      flex: 1;
      padding: 8px 7px;
      font-size: 12px;
      border-radius: 9px;
    }
    .empty {
      grid-column: 1 / -1;
      padding: 46px;
      text-align: center;
      color: #94a3b8;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(15, 23, 42, .78);
      padding: 28px;
    }
    .modal.open {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-box {
      width: min(960px, 96vw);
      height: min(92vh, 920px);
      background: white;
      border-radius: 20px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .modal-head h2 {
      margin: 0;
      font-size: 18px;
    }
    .canvas-wrap {
      flex: 1;
      overflow: auto;
      background: #f1f5f9;
      border-radius: 14px;
      padding: 18px;
      text-align: center;
    }
    #largeCanvas {
      max-width: 100%;
      height: auto;
      background: white;
      box-shadow: 0 6px 18px rgba(15, 23, 42, .12);
    }
  </style>
</head>
<body>
  <header>
    <h1>PDF 페이지 편집기</h1>
    <p>PDF를 여러 개 올리고, 미리보기로 내용을 확인하면서 삭제·순서 변경 후 새 PDF로 저장합니다.</p>
  </header>

  <main>
    <section class="panel">
      <div class="toolbar">
        <div class="upload-box">
          <input id="pdfInput" type="file" accept="application/pdf" multiple />
          <p class="status" id="status">PDF 파일을 선택하세요.</p>
        </div>
        <div class="actions">
          <button class="secondary" id="clearBtn">전체 초기화</button>
          <button class="primary" id="downloadBtn" disabled>편집한 PDF 다운로드</button>
        </div>
      </div>

      <p class="hint">
        사용법: 페이지 카드를 드래그해서 순서를 바꾸고, 썸네일을 클릭하면 크게 볼 수 있습니다. 불필요한 페이지는 삭제하면 됩니다.
      </p>

      <div id="pages" class="pages">
        <div class="empty">아직 불러온 PDF 페이지가 없습니다.</div>
      </div>
    </section>
  </main>

  <div class="modal" id="previewModal">
    <div class="modal-box">
      <div class="modal-head">
        <h2 id="modalTitle">페이지 미리보기</h2>
        <button class="danger" id="closeModal">닫기</button>
      </div>
      <div class="canvas-wrap">
        <canvas id="largeCanvas"></canvas>
      </div>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const input = document.getElementById("pdfInput");
    const pagesEl = document.getElementById("pages");
    const statusEl = document.getElementById("status");
    const downloadBtn = document.getElementById("downloadBtn");
    const clearBtn = document.getElementById("clearBtn");
    const modal = document.getElementById("previewModal");
    const modalTitle = document.getElementById("modalTitle");
    const largeCanvas = document.getElementById("largeCanvas");
    const closeModal = document.getElementById("closeModal");

    let files = [];
    let pageItems = [];
    let draggedIndex = null;

    input.addEventListener("change", async (e) => {
      const selected = Array.from(e.target.files);
      if (!selected.length) return;

      statusEl.textContent = "PDF를 불러오는 중입니다...";
      downloadBtn.disabled = true;

      for (const file of selected) {
        const arrayBuffer = await file.arrayBuffer();
        const fileId = crypto.randomUUID();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer.slice(0) }).promise;

        files.push({
          id: fileId,
          name: file.name,
          arrayBuffer
        });

        for (let i = 1; i <= pdf.numPages; i++) {
          pageItems.push({
            id: crypto.randomUUID(),
            fileId,
            fileName: file.name,
            pageNumber: i,
            pageIndex: i - 1
          });
        }
      }

      await renderPages();
      statusEl.textContent = `총 ${pageItems.length}페이지를 불러왔습니다.`;
      downloadBtn.disabled = pageItems.length === 0;
      input.value = "";
    });

    async function renderPages() {
      pagesEl.innerHTML = "";

      if (pageItems.length === 0) {
        pagesEl.innerHTML = '<div class="empty">아직 불러온 PDF 페이지가 없습니다.</div>';
        downloadBtn.disabled = true;
        return;
      }

      pageItems.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "page-card";
        card.draggable = true;
        card.dataset.index = index;

        const canvas = document.createElement("canvas");
        canvas.className = "thumb";
        canvas.title = "클릭하면 크게 볼 수 있습니다.";
        canvas.addEventListener("click", () => openPreview(item));

        const meta = document.createElement("div");
        meta.className = "page-meta";
        meta.innerHTML = `
          <div class="page-num">편집 순서 ${index + 1}</div>
          <div>${item.fileName}</div>
          <div>원본 ${item.pageNumber}페이지</div>
        `;

        const mini = document.createElement("div");
        mini.className = "mini-actions";

        const previewBtn = document.createElement("button");
        previewBtn.className = "secondary";
        previewBtn.textContent = "크게 보기";
        previewBtn.addEventListener("click", () => openPreview(item));

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "danger";
        deleteBtn.textContent = "삭제";
        deleteBtn.addEventListener("click", () => {
          pageItems.splice(index, 1);
          renderPages();
          statusEl.textContent = `현재 ${pageItems.length}페이지가 남아 있습니다.`;
        });

        mini.appendChild(previewBtn);
        mini.appendChild(deleteBtn);
        card.appendChild(canvas);
        card.appendChild(meta);
        card.appendChild(mini);

        card.addEventListener("dragstart", () => {
          draggedIndex = index;
          card.classList.add("dragging");
        });
        card.addEventListener("dragend", () => {
          draggedIndex = null;
          card.classList.remove("dragging");
        });
        card.addEventListener("dragover", (e) => e.preventDefault());
        card.addEventListener("drop", async (e) => {
          e.preventDefault();
          const targetIndex = Number(card.dataset.index);
          if (draggedIndex === null || draggedIndex === targetIndex) return;

          const [moved] = pageItems.splice(draggedIndex, 1);
          pageItems.splice(targetIndex, 0, moved);
          await renderPages();
          statusEl.textContent = "페이지 순서가 변경되었습니다.";
        });

        pagesEl.appendChild(card);
        renderThumb(canvas, item);
      });

      downloadBtn.disabled = false;
    }

    async function getPdfPage(item) {
      const source = files.find(f => f.id === item.fileId);
      const pdf = await pdfjsLib.getDocument({ data: source.arrayBuffer.slice(0) }).promise;
      return await pdf.getPage(item.pageNumber);
    }

    async function renderThumb(canvas, item) {
      const page = await getPdfPage(item);
      const viewport = page.getViewport({ scale: 0.28 });
      const ratio = window.devicePixelRatio || 1;
      canvas.width = viewport.width * ratio;
      canvas.height = viewport.height * ratio;
      const context = canvas.getContext("2d");
      context.setTransform(ratio, 0, 0, ratio, 0, 0);
      await page.render({ canvasContext: context, viewport }).promise;
    }

    async function openPreview(item) {
      modal.classList.add("open");
      modalTitle.textContent = `${item.fileName} - 원본 ${item.pageNumber}페이지`;
      const page = await getPdfPage(item);
      const viewport = page.getViewport({ scale: 1.45 });
      const ratio = window.devicePixelRatio || 1;
      largeCanvas.width = viewport.width * ratio;
      largeCanvas.height = viewport.height * ratio;
      largeCanvas.style.width = viewport.width + "px";
      largeCanvas.style.height = viewport.height + "px";
      const context = largeCanvas.getContext("2d");
      context.setTransform(ratio, 0, 0, ratio, 0, 0);
      await page.render({ canvasContext: context, viewport }).promise;
    }

    closeModal.addEventListener("click", () => modal.classList.remove("open"));
    modal.addEventListener("click", (e) => {
      if (e.target === modal) modal.classList.remove("open");
    });

    clearBtn.addEventListener("click", () => {
      files = [];
      pageItems = [];
      renderPages();
      statusEl.textContent = "초기화되었습니다.";
    });

    downloadBtn.addEventListener("click", async () => {
      if (!pageItems.length) return;

      statusEl.textContent = "새 PDF를 만드는 중입니다...";
      downloadBtn.disabled = true;

      const { PDFDocument } = PDFLib;
      const outputPdf = await PDFDocument.create();
      const sourceDocs = new Map();

      for (const file of files) {
        const doc = await PDFDocument.load(file.arrayBuffer.slice(0));
        sourceDocs.set(file.id, doc);
      }

      for (const item of pageItems) {
        const sourceDoc = sourceDocs.get(item.fileId);
        const [copiedPage] = await outputPdf.copyPages(sourceDoc, [item.pageIndex]);
        outputPdf.addPage(copiedPage);
      }

      const pdfBytes = await outputPdf.save();
      const blob = new Blob([pdfBytes], { type: "application/pdf" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "edited-pdf.pdf";
      a.click();
      URL.revokeObjectURL(url);

      statusEl.textContent = "다운로드가 완료되었습니다.";
      downloadBtn.disabled = false;
    });
  </script>
</body>
</html>
